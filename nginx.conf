# --- Rate Limiting Zone: max 10 requests/sec per IP (traffic control) ---
limit_req_zone $binary_remote_addr zone=mylimit:10m rate=10r/s;

server {
    listen 80;
    server_name _;

    # Apply rate limit — burst allows short traffic spikes without blocking real users
    limit_req zone=mylimit burst=20 nodelay;

    root /usr/share/nginx/html;
    index index.html;

    # --- Gzip Compression: reduces file size sent over network = faster load, less lag ---
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1000;

    # --- Cache static assets (images/sounds) in browser for 7 days ---
    location ~* \.(png|jpg|jpeg|mp3|mp4|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Custom error handling
    error_page 500 502 503 504 /index.html;
}
